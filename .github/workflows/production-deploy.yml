name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
  CLOUDFRONT_ID: ${{ secrets.PROD_CLOUDFRONT_ID }}
  EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
  EC2_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/symflow

jobs:
  # ── Safety gate: a human must approve before anything touches production ──
  approve:
    name: Await Manual Approval
    runs-on: ubuntu-latest
    environment: production          # requires a reviewer configured in repo settings
    steps:
      - run: echo "Approved — proceeding to production deploy"

  deploy-frontend:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.PROD_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/build/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_ID }} --paths "/*"

  deploy-backend:
    name: Deploy Backend to Production EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.PROD_EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            git fetch origin main
            git reset --hard origin/main

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            # Zero-downtime: reload gunicorn in-place (no dropped connections)
            sudo systemctl reload gunicorn
            sudo systemctl restart celery
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f key.pem

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: failure()
    steps:
      - name: Post failure to Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text":"🚨 Production deploy FAILED on commit ${{ github.sha }} by ${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
