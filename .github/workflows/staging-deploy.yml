name: Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  AWS_REGION: ap-south-1
  EC2_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/symflow

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest
    if: ${{ secrets.STAGING_S3_BUCKET != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/build/ s3://${{ secrets.STAGING_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} \
            --paths "/*"

  deploy-backend:
    name: Deploy Backend to Staging EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ always() && needs.deploy-frontend.result != 'failure' && secrets.STAGING_EC2_HOST != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.STAGING_EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ env.EC2_USER }}@${{ secrets.STAGING_EC2_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            git fetch origin staging
            git reset --hard origin/staging

            source venv/bin/activate
            pip install -r requirements.txt --quiet

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart gunicorn
            sudo systemctl restart celery
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f key.pem
